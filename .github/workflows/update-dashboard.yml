name: Update Creative Dashboard

on:
  schedule:
    - cron: '0 12-22 * * 1-5'   # de 9h às 19h, a cada hora (UTC-3)
  workflow_dispatch:              # permite rodar manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python generate_data.py

      - name: Commit and push
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard@g4educacao.com"
          git add index.html data.json
          git diff --staged --quiet || git commit -m "chore: atualiza dashboard $(date +'%d/%m/%Y %H:%M')"
          git push
