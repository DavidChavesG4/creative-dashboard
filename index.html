<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Creative 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --border: #30363d; --text: #e6edf3; --muted: #8b949e;
    --blue: #58a6ff; --green: #3fb950; --yellow: #d29922;
    --red: #f85149; --purple: #bc8cff; --orange: #ffa657;
    --teal: #39d353;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .header h1 span { background: linear-gradient(135deg, var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .last-updated { color: var(--muted); font-size: 12px; }
  .btn-refresh { background: var(--blue); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity .2s; }
  .btn-refresh:hover { opacity: .85; }
  .btn-refresh:disabled { opacity: .5; cursor: not-allowed; }

  /* FILTERS */
  .filters { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .filter-label { color: var(--muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer; outline: none; min-width: 140px; }
  select:focus { border-color: var(--blue); }
  .btn-clear { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all .2s; }
  .btn-clear:hover { color: var(--text); border-color: var(--muted); }

  /* LAYOUT */
  .main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: border-color .2s; }
  .kpi-card:hover { border-color: var(--blue); }
  .kpi-label { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 700; line-height: 1; }
  .kpi-sub { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .kpi-card.blue .kpi-value { color: var(--blue); }
  .kpi-card.green .kpi-value { color: var(--green); }
  .kpi-card.yellow .kpi-value { color: var(--yellow); }
  .kpi-card.red .kpi-value { color: var(--red); }
  .kpi-card.purple .kpi-value { color: var(--purple); }
  .kpi-card.orange .kpi-value { color: var(--orange); }

  /* CHARTS GRID */
  .charts-grid { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; margin-bottom: 20px; }
  .charts-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
  .chart-wrap { position: relative; height: 220px; }
  .chart-wrap.tall { height: 280px; }

  /* TABLE */
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .table-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-header h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .table-count { color: var(--muted); font-size: 12px; }
  .table-wrap { overflow-x: auto; max-height: 400px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; position: sticky; top: 0; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; white-space: nowrap; max-width: 280px; overflow: hidden; text-overflow: ellipsis; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-aprovado { background: #1a4731; color: var(--green); }
  .badge-finalizado { background: #0d2d6b; color: var(--blue); }
  .badge-producao { background: #2d1f4b; color: var(--purple); }
  .badge-revisao { background: #3d2d0d; color: var(--yellow); }
  .badge-cancelada { background: #3d1515; color: var(--red); }
  .badge-erro { background: #4d1010; color: #ff6b6b; }
  .badge-fila { background: #1a2a3a; color: #79c0ff; }
  .badge-default { background: var(--surface2); color: var(--muted); }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; flex-direction: column; gap: 12px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOKEN INPUT */
  .token-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .token-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; max-width: 440px; width: 100%; }
  .token-card h2 { margin-bottom: 8px; font-size: 20px; }
  .token-card p { color: var(--muted); margin-bottom: 20px; font-size: 13px; line-height: 1.6; }
  .token-input { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px; font-family: monospace; margin-bottom: 12px; }
  .token-input:focus { outline: none; border-color: var(--blue); }
  .btn-connect { width: 100%; background: var(--blue); color: #fff; border: none; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px; color: var(--muted); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .charts-grid, .charts-grid.three { grid-template-columns: 1fr; }
    .filters { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- TOKEN SCREEN -->
<div id="tokenScreen" class="token-screen">
  <div class="token-card">
    <h2>🎨 Dashboard Creative 2026</h2>
    <p>Conecte ao Notion para visualizar as demandas em tempo real. O token fica salvo no navegador.</p>
    <input id="tokenInput" class="token-input" type="password" placeholder="ntn_..." value="">
    <button class="btn-connect" onclick="connect()">Conectar ao Notion</button>
    <p id="tokenError" style="color:var(--red);font-size:12px;margin-top:8px;display:none;"></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">
  <div class="header">
    <h1>🎨 <span>Dashboard Creative</span> 2026</h1>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated">—</span>
      <button class="btn-refresh" id="btnRefresh" onclick="loadData()">↻ Atualizar</button>
      <button class="btn-clear" onclick="logout()" style="font-size:11px;">Sair</button>
    </div>
  </div>

  <div class="filters" id="filtersBar">
    <span class="filter-label">Filtros:</span>
    <select id="fStatus" onchange="applyFilters()"><option value="">Todos os Status</option></select>
    <select id="fTipo" onchange="applyFilters()"><option value="">Todos os Tipos</option></select>
    <select id="fArea" onchange="applyFilters()"><option value="">Todas as Áreas</option></select>
    <select id="fAreaDem" onchange="applyFilters()"><option value="">Todas as BUs</option></select>
    <select id="fCreative" onchange="applyFilters()"><option value="">Todos os Criativos</option></select>
    <select id="fFreelancer" onchange="applyFilters()">
      <option value="">Interno + Freelancer</option>
      <option value="1">Freelancer</option>
      <option value="0">Interno</option>
    </select>
    <select id="fMes" onchange="applyFilters()"><option value="">Todos os Meses</option></select>
    <button class="btn-clear" onclick="clearFilters()">✕ Limpar</button>
  </div>

  <div class="main" id="mainContent">
    <div class="loading"><div class="spinner"></div><span>Carregando dados...</span></div>
  </div>
</div>

<script>
const DB_ID = '2e0b431349e180498fe0cbaf43c58f21';
let TOKEN = '';
let allData = [];
let filteredData = [];
let charts = {};

// ---- AUTH ----
function connect() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  TOKEN = t;
  localStorage.setItem('notion_token_dash', t);
  document.getElementById('tokenScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

function logout() {
  localStorage.removeItem('notion_token_dash');
  location.reload();
}

// Check saved token
const saved = localStorage.getItem('notion_token_dash');
if (saved) {
  TOKEN = saved;
  document.getElementById('tokenInput').value = saved;
  document.getElementById('tokenScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ---- DATA LOAD ----
async function fetchAll() {
  let results = [], cursor = null;
  const PROXY = 'https://notion-proxy-g4.vercel.app/api/notion';
  
  do {
    const body = { page_size: 100, sorts: [{ property: 'Criado em', direction: 'descending' }] };
    if (cursor) body.start_cursor = cursor;

    // Try direct first, fallback to proxy pattern
    let resp;
    try {
      resp = await fetch(`https://api.notion.com/v1/databases/${DB_ID}/query`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${TOKEN}`,
          'Notion-Version': '2022-06-28',
          'Content-Type': 'application/json',
          'Access-Control-Allow-Origin': '*'
        },
        body: JSON.stringify(body)
      });
    } catch(e) {
      throw new Error('CORS: use a extensão Notion ou acesse via app desktop');
    }

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.message || 'Erro ao buscar dados');
    }
    const d = await resp.json();
    results = results.concat(d.results || []);
    cursor = d.has_more ? d.next_cursor : null;
  } while (cursor);
  
  return results;
}

async function loadData() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true; btn.textContent = '⟳ Carregando...';
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div><span>Carregando '+allData.length+' demandas...</span></div>';

  try {
    allData = await fetchAll();
    populateFilters();
    applyFilters();
    document.getElementById('lastUpdated').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="loading"><p style="color:var(--red)">Erro: ${e.message}</p><p style="color:var(--muted);font-size:12px;margin-top:8px;">Verifique o token e permissões do Notion</p><button class="btn-clear" onclick="logout()" style="margin-top:12px;">Trocar token</button></div>`;
  }
  btn.disabled = false; btn.textContent = '↻ Atualizar';
}

// ---- FILTERS ----
function populateFilters() {
  const statuses = new Set(), tipos = new Set(), areas = new Set(), areasDem = new Set(), creatives = new Set(), meses = new Set();

  allData.forEach(p => {
    const props = p.properties;
    const s = props.Status?.status?.name; if (s) statuses.add(s);
    const t = props['Tipo de Demanda']?.select?.name; if (t) tipos.add(t);
    (props['ÁREA']?.multi_select || []).forEach(a => areas.add(a.name));
    (props['Área Demandadora']?.multi_select || []).forEach(a => areasDem.add(a.name));
    (props['Creative']?.people || []).forEach(c => creatives.add(c.name));
    const criado = props['Criado em']?.created_time;
    if (criado) {
      const d = new Date(criado);
      meses.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
  });

  fillSelect('fStatus', statuses);
  fillSelect('fTipo', tipos);
  fillSelect('fArea', areas);
  fillSelect('fAreaDem', areasDem);
  fillSelect('fCreative', creatives);
  fillSelect('fMes', meses, v => {
    const [y, m] = v.split('-');
    return new Date(y, m-1).toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
  });
}

function fillSelect(id, set, labelFn) {
  const el = document.getElementById(id);
  const current = el.value;
  const first = el.options[0];
  el.innerHTML = '';
  el.appendChild(first);
  [...set].sort().forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = labelFn ? labelFn(v) : v;
    el.appendChild(opt);
  });
  el.value = current;
}

function applyFilters() {
  const fStatus = document.getElementById('fStatus').value;
  const fTipo = document.getElementById('fTipo').value;
  const fArea = document.getElementById('fArea').value;
  const fAreaDem = document.getElementById('fAreaDem').value;
  const fCreative = document.getElementById('fCreative').value;
  const fFreelancer = document.getElementById('fFreelancer').value;
  const fMes = document.getElementById('fMes').value;

  filteredData = allData.filter(p => {
    const props = p.properties;
    if (fStatus && props.Status?.status?.name !== fStatus) return false;
    if (fTipo && props['Tipo de Demanda']?.select?.name !== fTipo) return false;
    if (fArea && !(props['ÁREA']?.multi_select || []).some(a => a.name === fArea)) return false;
    if (fAreaDem && !(props['Área Demandadora']?.multi_select || []).some(a => a.name === fAreaDem)) return false;
    if (fCreative && !(props['Creative']?.people || []).some(c => c.name === fCreative)) return false;
    if (fFreelancer === '1' && !props['Freelancer']?.checkbox) return false;
    if (fFreelancer === '0' && props['Freelancer']?.checkbox) return false;
    if (fMes) {
      const criado = props['Criado em']?.created_time;
      if (!criado) return false;
      const d = new Date(criado);
      const m = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (m !== fMes) return false;
    }
    return true;
  });

  render();
}

function clearFilters() {
  ['fStatus','fTipo','fArea','fAreaDem','fCreative','fFreelancer','fMes'].forEach(id => document.getElementById(id).value = '');
  applyFilters();
}

// ---- RENDER ----
function render() {
  // Compute aggregates
  const total = filteredData.length;
  const statusMap = {}, tipoMap = {}, areaMap = {}, areaDemMap = {}, creativeMap = {}, monthMap = {};
  let freelancerCount = 0, aprovadoPrimeira = 0, foraSLA = 0, revisoes = 0, emProducao = 0;

  filteredData.forEach(p => {
    const props = p.properties;
    const s = props.Status?.status?.name || 'Sem status';
    statusMap[s] = (statusMap[s]||0) + 1;
    if (s === 'Revisão') revisoes++;
    if (s === 'Em produção') emProducao++;

    const t = props['Tipo de Demanda']?.select?.name || 'Sem tipo';
    tipoMap[t] = (tipoMap[t]||0) + 1;

    (props['ÁREA']?.multi_select||[]).forEach(a => areaMap[a.name] = (areaMap[a.name]||0)+1);
    (props['Área Demandadora']?.multi_select||[]).forEach(a => areaDemMap[a.name] = (areaDemMap[a.name]||0)+1);
    (props['Creative']?.people||[]).forEach(c => creativeMap[c.name] = (creativeMap[c.name]||0)+1);

    const criado = props['Criado em']?.created_time;
    if (criado) {
      const d = new Date(criado);
      const k = d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
      monthMap[k] = (monthMap[k]||0)+1;
    }
    if (props['Freelancer']?.checkbox) freelancerCount++;
    if (props['Aprovado de Primeira?']?.checkbox) aprovadoPrimeira++;
    if (props['Fora de SLA?']?.checkbox) foraSLA++;
  });

  const aprovados = statusMap['Aprovado']||0;
  const finalizados = statusMap['Finalizado']||0;
  const cancelados = statusMap['Cancelada']||0;

  document.getElementById('mainContent').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card blue"><div class="kpi-label">Total de Demandas</div><div class="kpi-value">${total}</div><div class="kpi-sub">no período filtrado</div></div>
      <div class="kpi-card green"><div class="kpi-label">Aprovadas</div><div class="kpi-value">${aprovados}</div><div class="kpi-sub">${total ? Math.round(aprovados/total*100) : 0}% do total</div></div>
      <div class="kpi-card teal" style="--teal:var(--teal)"><div class="kpi-label" style="color:var(--muted)">Finalizadas</div><div class="kpi-value" style="color:var(--teal)">${finalizados}</div><div class="kpi-sub">entregues</div></div>
      <div class="kpi-card yellow"><div class="kpi-label">Em Revisão</div><div class="kpi-value">${revisoes}</div><div class="kpi-sub">aguardando correção</div></div>
      <div class="kpi-card red"><div class="kpi-label">Canceladas</div><div class="kpi-value">${cancelados}</div><div class="kpi-sub">${total ? Math.round(cancelados/total*100) : 0}% do total</div></div>
      <div class="kpi-card orange"><div class="kpi-label">Freelancer</div><div class="kpi-value">${freelancerCount}</div><div class="kpi-sub">${total ? Math.round(freelancerCount/total*100) : 0}% das demandas</div></div>
      <div class="kpi-card purple"><div class="kpi-label">Fora de SLA</div><div class="kpi-value">${foraSLA}</div><div class="kpi-sub">ultrapassaram prazo</div></div>
      <div class="kpi-card blue"><div class="kpi-label">Aprov. de 1ª</div><div class="kpi-value">${aprovadoPrimeira}</div><div class="kpi-sub">${total ? Math.round(aprovadoPrimeira/total*100) : 0}% aprovados direto</div></div>
    </div>

    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Status das Demandas</div><div class="chart-wrap"><canvas id="chartStatus"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Por Tipo de Demanda</div><div class="chart-wrap"><canvas id="chartTipo"></canvas></div></div>
    </div>

    <div class="charts-grid three">
      <div class="chart-card"><div class="chart-title">Por Área (CREAT/ADV)</div><div class="chart-wrap"><canvas id="chartArea"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Por BU Demandadora</div><div class="chart-wrap"><canvas id="chartAreaDem"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Carga por Criativo</div><div class="chart-wrap"><canvas id="chartCreative"></canvas></div></div>
    </div>

    <div class="charts-grid">
      <div class="chart-card full"><div class="chart-title">Volume por Mês</div><div class="chart-wrap tall"><canvas id="chartMonth"></canvas></div></div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <h3>Demandas</h3>
        <span class="table-count" id="tableCount">${filteredData.length} resultados</span>
      </div>
      <div class="table-wrap">
        <table id="mainTable">
          <thead><tr>
            <th onclick="sortTable('id')">ID ↕</th>
            <th onclick="sortTable('title')">Nome ↕</th>
            <th onclick="sortTable('status')">Status ↕</th>
            <th onclick="sortTable('tipo')">Tipo ↕</th>
            <th onclick="sortTable('area')">Área ↕</th>
            <th onclick="sortTable('bu')">BU ↕</th>
            <th onclick="sortTable('creative')">Criativo ↕</th>
            <th onclick="sortTable('prazo')">Prazo ↕</th>
            <th onclick="sortTable('criado')">Criado ↕</th>
          </tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  `;

  // Draw charts
  destroyCharts();
  drawDoughnut('chartStatus', statusMap);
  drawBar('chartTipo', tipoMap, '#58a6ff');
  drawDoughnut('chartArea', areaMap);
  drawBar('chartAreaDem', areaDemMap, '#bc8cff');
  drawHBar('chartCreative', creativeMap);
  drawLine('chartMonth', monthMap);

  // Fill table
  renderTable();
}

let sortKey = 'criado', sortDir = -1;
function sortTable(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = -1; }
  renderTable();
}

function renderTable() {
  const body = document.getElementById('tableBody');
  if (!body) return;

  const rows = [...filteredData].sort((a, b) => {
    const pa = a.properties, pb = b.properties;
    let va, vb;
    if (sortKey === 'id') { va = pa.ID?.unique_id?.number||0; vb = pb.ID?.unique_id?.number||0; }
    else if (sortKey === 'title') { va = getTitle(pa); vb = getTitle(pb); }
    else if (sortKey === 'status') { va = pa.Status?.status?.name||''; vb = pb.Status?.status?.name||''; }
    else if (sortKey === 'tipo') { va = pa['Tipo de Demanda']?.select?.name||''; vb = pb['Tipo de Demanda']?.select?.name||''; }
    else if (sortKey === 'area') { va = (pa['ÁREA']?.multi_select||[]).map(x=>x.name).join(','); vb = (pb['ÁREA']?.multi_select||[]).map(x=>x.name).join(','); }
    else if (sortKey === 'bu') { va = (pa['Área Demandadora']?.multi_select||[]).map(x=>x.name).join(','); vb = (pb['Área Demandadora']?.multi_select||[]).map(x=>x.name).join(','); }
    else if (sortKey === 'creative') { va = (pa['Creative']?.people||[]).map(x=>x.name).join(','); vb = (pb['Creative']?.people||[]).map(x=>x.name).join(','); }
    else if (sortKey === 'prazo') { va = pa['📅 Prazo entrega']?.date?.start||''; vb = pb['📅 Prazo entrega']?.date?.start||''; }
    else { va = pa['Criado em']?.created_time||''; vb = pb['Criado em']?.created_time||''; }
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });

  body.innerHTML = rows.slice(0, 200).map(p => {
    const props = p.properties;
    const uid = props.ID?.unique_id;
    const id = uid ? `${uid.prefix||''}-${uid.number}` : '—';
    const title = getTitle(props);
    const status = props.Status?.status?.name || '—';
    const tipo = props['Tipo de Demanda']?.select?.name || '—';
    const area = (props['ÁREA']?.multi_select||[]).map(a=>a.name).join(', ') || '—';
    const bu = (props['Área Demandadora']?.multi_select||[]).map(a=>a.name).join(', ') || '—';
    const creative = (props['Creative']?.people||[]).map(c=>c.name).join(', ') || '—';
    const prazo = props['📅 Prazo entrega']?.date?.start ? new Date(props['📅 Prazo entrega'].date.start).toLocaleDateString('pt-BR') : '—';
    const criado = props['Criado em']?.created_time ? new Date(props['Criado em'].created_time).toLocaleDateString('pt-BR') : '—';
    const url = p.url || '#';
    const badgeClass = statusBadge(status);
    return `<tr>
      <td style="color:var(--muted);font-family:monospace;font-size:11px;">${id}</td>
      <td><a href="${url}" target="_blank" style="color:var(--blue);text-decoration:none;" title="${title}">${title.substring(0,50)}${title.length>50?'…':''}</a></td>
      <td><span class="badge ${badgeClass}">${status}</span></td>
      <td>${tipo}</td>
      <td>${area}</td>
      <td>${bu}</td>
      <td>${creative}</td>
      <td>${prazo}</td>
      <td style="color:var(--muted)">${criado}</td>
    </tr>`;
  }).join('');

  if (rows.length > 200) {
    document.getElementById('tableCount').textContent = `${filteredData.length} resultados (exibindo 200)`;
  }
}

function getTitle(props) {
  const t = props['']?.title || [];
  return t.map(x=>x.plain_text).join('') || '(sem título)';
}

function statusBadge(s) {
  const m = { 'Aprovado':'badge-aprovado','Finalizado':'badge-finalizado','Em produção':'badge-producao','Revisão':'badge-revisao','Cancelada':'badge-cancelada','ERRO':'badge-erro','Na fila':'badge-fila' };
  return m[s] || 'badge-default';
}

// ---- CHARTS ----
const COLORS = ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#ffa657','#39d353','#79c0ff','#f0883e','#56d364'];

function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

function drawDoughnut(id, data) {
  const sorted = Object.entries(data).sort((a,b) => b[1]-a[1]);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: sorted.map(x=>x[0]), datasets: [{ data: sorted.map(x=>x[1]), backgroundColor: COLORS, borderWidth: 2, borderColor: '#161b22' }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#8b949e', font: { size: 11 }, padding: 8, boxWidth: 12 } } } }
  });
}

function drawBar(id, data, color) {
  const sorted = Object.entries(data).sort((a,b) => b[1]-a[1]).slice(0,10);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, {
    type: 'bar',
    data: { labels: sorted.map(x=>x[0]), datasets: [{ data: sorted.map(x=>x[1]), backgroundColor: color || COLORS[0], borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } }, y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } } } }
  });
}

function drawHBar(id, data) {
  const sorted = Object.entries(data).sort((a,b) => b[1]-a[1]).slice(0,10);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, {
    type: 'bar',
    data: { labels: sorted.map(x=>x[0]), datasets: [{ data: sorted.map(x=>x[1]), backgroundColor: COLORS, borderRadius: 4 }] },
    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } }, y: { ticks: { color: '#8b949e', font: { size: 11 } }, grid: { color: '#21262d' } } } }
  });
}

function drawLine(id, data) {
  const sorted = Object.keys(data).sort();
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, {
    type: 'line',
    data: { labels: sorted, datasets: [{ label: 'Demandas', data: sorted.map(k=>data[k]), borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.1)', fill: true, tension: 0.4, pointBackgroundColor: '#58a6ff', pointRadius: 5 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } }, y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } } } }
  });
}

// Auto-load if token saved
if (saved) loadData();
</script>
