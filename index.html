<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Creative — G4</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3150;
    --text: #e8eaf6;
    --text-muted: #7b82a8;
    --green: #4caf7d;
    --red: #f44b6e;
    --yellow: #f5a623;
    --blue: #5b8af5;
    --purple: #a78bfa;
    --cyan: #22d3ee;
    --accent: #5b8af5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .3px; white-space: nowrap; }
  .header-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .meta { color: var(--text-muted); font-size: 11px; }

  .toggle-group {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .toggle-group button {
    background: none; border: none;
    padding: 4px 14px; border-radius: 6px;
    font-size: 12px; font-weight: 700; letter-spacing: .4px;
    cursor: pointer; color: var(--text-muted); transition: .15s;
  }
  .toggle-group button:hover { background: var(--surface2); color: var(--text); }
  .btn-creat-active { background: #1e3a5f !important; color: #5b8af5 !important; }
  .btn-red-active   { background: #3d1a1a !important; color: #f44b6e !important; }
  .btn-mes-active   { background: var(--surface2) !important; color: var(--accent) !important; }

  nav {
    display: flex; gap: 4px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  nav button {
    background: none; border: none; color: var(--text-muted);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: .15s;
  }
  nav button:hover { background: var(--surface2); color: var(--text); }
  nav button.active { background: var(--surface2); color: var(--accent); }

  .page { display: none; padding: 20px 24px; }
  .page.active { display: block; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 14px;
  }
  .kpi .label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .kpi .value { font-size: 26px; font-weight: 700; line-height: 1; }
  .kpi .sub { color: var(--text-muted); font-size: 11px; margin-top: 4px; }
  .kpi.danger { border-color: rgba(244,75,110,.4); }
  .kpi.warn   { border-color: rgba(245,166,35,.4); }
  .kpi.ok     { border-color: rgba(76,175,125,.4); }
  .kpi.info   { border-color: rgba(91,138,245,.3); }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  @media(max-width:900px){ .charts-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
  }
  .card h3 { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .chart-wrap { position: relative; height: 200px; }

  .designer-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .designer-tab {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 13px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: .15s;
  }
  .designer-tab:hover { border-color: var(--accent); }
  .designer-tab.active { border-color: var(--accent); background: rgba(91,138,245,.1); color: var(--accent); }

  .designer-panel { display: none; }
  .designer-panel.active { display: block; }
  .designer-kpis { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 18px; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 7px 10px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
  td { padding: 8px 10px; border-bottom: 1px solid rgba(46,49,80,.5); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .status-pill {
    display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .s-na-fila    { background: rgba(91,138,245,.15);  color: var(--blue); }
  .s-enviado    { background: rgba(34,211,238,.15);   color: var(--cyan); }
  .s-producao   { background: rgba(167,139,250,.15);  color: var(--purple); }
  .s-aprovado   { background: rgba(76,175,125,.15);   color: var(--green); }
  .s-finalizado { background: rgba(76,175,125,.15);   color: var(--green); }
  .s-cancelada  { background: rgba(244,75,110,.15);   color: var(--red); }
  .s-revisao    { background: rgba(245,166,35,.15);   color: var(--yellow); }
  .s-alteracao  { background: rgba(245,166,35,.15);   color: var(--yellow); }
  .s-aprovpend  { background: rgba(245,166,35,.15);   color: var(--yellow); }
  .s-default    { background: rgba(123,130,168,.15);  color: var(--text-muted); }
  .atraso-tag   { color: var(--red); font-size: 11px; font-weight: 600; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green  { background: rgba(76,175,125,.15);  color: var(--green); }
  .badge-red    { background: rgba(244,75,110,.15);  color: var(--red); }
  .badge-yellow { background: rgba(245,166,35,.15);  color: var(--yellow); }

  footer { text-align: center; padding: 16px; color: var(--text-muted); font-size: 11px; border-top: 1px solid var(--border); margin-top: 8px; }

  .empty-state { color: var(--text-muted); padding: 32px; text-align: center; font-size: 13px; }

  /* Metricas */
  .met-section { margin-bottom: 24px; }
  .met-section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
    color: var(--text-muted); margin-bottom: 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .met-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .met-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 14px; position: relative;
  }
  .met-card.ok     { border-left: 3px solid var(--green); }
  .met-card.warn   { border-left: 3px solid var(--yellow); }
  .met-card.danger { border-left: 3px solid var(--red); }
  .met-card.empty  { border-left: 3px solid rgba(123,130,168,.4); opacity: .7; }
  .met-card .m-label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .met-card .m-value { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .met-card .m-sub   { color: var(--text-muted); font-size: 11px; }
  .met-card .m-empty { color: var(--text-muted); font-size: 12px; font-style: italic; margin-top: 4px; }
  .met-bar-list { display: flex; flex-direction: column; gap: 8px; }
  .met-bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .met-bar-label { flex: 0 0 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .met-bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 6px; }
  .met-bar-fill  { height: 6px; border-radius: 4px; background: var(--accent); }
  .met-bar-val   { flex: 0 0 30px; text-align: right; color: var(--text-muted); font-size: 11px; }
  .notion-link {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--blue); font-size: 11px; font-weight: 600;
    text-decoration: none; padding: 4px 10px;
    border: 1px solid rgba(91,138,245,.3); border-radius: 6px;
    transition: .15s;
  }
  .notion-link:hover { background: rgba(91,138,245,.08); border-color: var(--blue); }

  /* Tooltip de demandas por tipo */
  .tipo-tooltip-wrap { position: relative; cursor: default; }
  .tipo-tooltip-wrap:hover .tipo-tooltip { display: block; }
  .tipo-tooltip {
    display: none;
    position: absolute; left: 0; top: 100%; z-index: 200;
    background: #1a1d27; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 0; min-width: 320px; max-width: 420px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
  }
  .tipo-tooltip-item {
    padding: 5px 12px; display: flex; align-items: baseline; gap: 8px;
    font-size: 12px; line-height: 1.4;
  }
  .tipo-tooltip-item:hover { background: rgba(255,255,255,.03); }
  .tipo-tooltip-key {
    flex-shrink: 0; color: var(--accent); font-size: 10px; font-weight: 600;
    font-family: monospace; white-space: nowrap;
  }
  .tipo-tooltip-title { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tipo-tooltip-more { padding: 4px 12px; font-size: 11px; color: var(--text-muted); font-style: italic; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Dashboard Creative — G4</h1>
    <!-- Toggle Time -->
    <div class="toggle-group" id="team-toggle">
      <button id="btn-creat" class="btn-creat-active" onclick="switchTeam('creat')">CREAT</button>
      <button id="btn-red" onclick="switchTeam('red')">RED</button>
    </div>
    <!-- Filtro de Mês -->
    <div class="toggle-group" id="mes-toggle"></div>
  </div>
  <div class="meta" id="header-meta">Carregando...</div>
</header>

<nav>
  <button class="active" onclick="showPage('geral', this)">Visao Geral</button>
  <button id="btn-nav-designers" onclick="showPage('designers', this)">Por Designer</button>
  <button onclick="showPage('areas', this)">Por Area</button>
  <button onclick="showPage('atrasos', this)">Atrasos</button>
  <button onclick="showPage('metricas', this)">Metricas</button>
</nav>

<!-- VISAO GERAL -->
<div id="page-geral" class="page active">
  <div class="kpi-grid" id="kpis-geral"></div>
  <div class="charts-grid">
    <div class="card"><h3>Status das Demandas</h3><div class="chart-wrap"><canvas id="chart-status"></canvas></div></div>
    <div class="card"><h3>Tipo de Demanda</h3><div class="chart-wrap"><canvas id="chart-tipo"></canvas></div></div>
  </div>
  <div class="charts-grid">
    <div class="card"><h3>Volume por Area Solicitante</h3><div class="chart-wrap"><canvas id="chart-area"></canvas></div></div>
    <div class="card"><h3 id="chart-designer-title">Demandas por Designer</h3><div class="chart-wrap"><canvas id="chart-designer"></canvas></div></div>
  </div>
</div>

<!-- POR DESIGNER -->
<div id="page-designers" class="page">
  <div class="designer-tabs" id="designer-tabs"></div>
  <div id="designer-panels"></div>
</div>

<!-- POR AREA -->
<div id="page-areas" class="page">
  <div class="charts-grid">
    <div class="card"><h3>Volume Total por Area</h3><div class="chart-wrap"><canvas id="chart-area2"></canvas></div></div>
    <div class="card"><h3>Atrasos por Area <span style="font-size:10px;color:var(--text-muted);font-weight:400">(clique para ver demandas)</span></h3><div class="chart-wrap"><canvas id="chart-area-atraso"></canvas></div></div>
  </div>
  <div id="area-drill-down" style="display:none;margin-top:14px"></div>
  <div class="card" style="margin-top:14px">
    <h3>Detalhamento por Area</h3>
    <div class="table-wrap"><table id="table-areas"></table></div>
  </div>
</div>

<!-- ATRASOS -->
<div id="page-atrasos" class="page">
  <div class="kpi-grid" id="kpis-atrasos"></div>
  <div class="card">
    <h3 id="chart-atrasos-designer-title">Atrasadas por Designer</h3>
    <div class="chart-wrap"><canvas id="chart-atrasos-designer"></canvas></div>
  </div>
  <div class="card" style="margin-top:14px">
    <h3>Tabela de Atrasos</h3>
    <div class="table-wrap"><table id="table-atrasos"></table></div>
  </div>
</div>

<!-- METRICAS -->
<div id="page-metricas" class="page">
  <div id="metricas-content"></div>
</div>

<footer id="footer-updated"></footer>

let currentTeam = 'creat';
let currentMes  = 'todos';
let chartInstances = {};

// ── HELPERS ────────────────────────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
}

function switchTeam(team) {
  // Atualiza label do botao de navegacao
  const btnDesigners = document.querySelector('nav button[onclick="showPage(\x27designers\x27, this)"]');
  currentTeam = team;
  document.getElementById('btn-creat').className = team === 'creat' ? 'btn-creat-active' : '';
  document.getElementById('btn-red').className   = team === 'red'   ? 'btn-red-active'   : '';
  document.documentElement.style.setProperty('--accent', team === 'creat' ? '#5b8af5' : '#f44b6e');
  const btnND = document.getElementById('btn-nav-designers');
  if (btnND) btnND.textContent = team === 'red' ? 'Por Redator' : 'Por Designer';
  currentMes = 'todos';
  buildMesToggle();
  renderAll();
}

function switchMes(mes) {
  currentMes = mes;
  document.querySelectorAll('#mes-toggle button').forEach(b => b.classList.remove('btn-mes-active'));
  const btn = document.querySelector(`#mes-toggle button[data-mes="${mes}"]`);
  if (btn) btn.classList.add('btn-mes-active');
  renderAll();
}

function buildMesToggle() {
  const d = getData();
  const el = document.getElementById('mes-toggle');
  el.innerHTML = '';
  const meses = d.meses || [];

  const todos = document.createElement('button');
  todos.textContent = 'Todos';
  todos.dataset.mes = 'todos';
  todos.onclick = () => switchMes('todos');
  if (currentMes === 'todos') todos.classList.add('btn-mes-active');
  el.appendChild(todos);

  meses.forEach(mes => {
    const btn = document.createElement('button');
    const [ano, m] = mes.split('-');
    const nomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    btn.textContent = nomes[parseInt(m)-1] + '/' + ano.slice(2);
    btn.dataset.mes = mes;
    btn.onclick = () => switchMes(mes);
    if (currentMes === mes) btn.classList.add('btn-mes-active');
    el.appendChild(btn);
  });
}

function getData() {
  return currentTeam === 'creat' ? DATA_CREAT : DATA_RED;
}

// Retorna os dados filtrados pelo mês selecionado
function getView() {
  const d = getData();
  if (currentMes === 'todos') return d;
  const m = d.por_mes?.[currentMes];
  if (!m) return { total:0, atrasados:0, cancelados:0, fora_sla:0, finalizados:0, em_aprovacao:0, freelancer:0, taxa_atraso_geral:0, status_counts:{}, tipo_counts:{}, area_counts:{}, area_atrasados:{}, metricas: d.metricas };
  // metricas de qualidade sempre do global (calculadas sobre finalizados, independente de mês de criação)
  return { ...d, ...m, freelancer: m.freelancer ?? 0, metricas: d.metricas };
}

  const m = {
    'Na fila': 's-na-fila', 'Enviado': 's-enviado', 'Em producao': 's-producao', 'Em produção': 's-producao',

  };
  return m[s] || 's-default';

function kpiHtml(label, value, sub, cls) {
  return `<div class="kpi ${cls||''}">
    <div class="label">${label}</div>
    <div class="value">${value}</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}

function mesLabel(mes) {
  if (!mes || mes === 'todos') return 'todos os meses';
  const [ano, m] = mes.split('-');
  const nomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return nomes[parseInt(m)-1] + '/' + ano;
}

Chart.register(ChartDataLabels);
function makeChart(id, type, labels, datasets, opts={}) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const isBar = type === 'bar';
  const isDoughnut = type === 'doughnut';
  const isHBar = opts.indexAxis === 'y';
  chartInstances[id] = new Chart(ctx, {
    type,
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#7b82a8', font: { size: 11 } } },
        datalabels: {
          font: { size: 11, weight: 'bold' },
          formatter: (value) => value > 0 ? value : '',
          anchor: isDoughnut ? 'center' : (isHBar ? 'end' : 'center'),
          align: isDoughnut ? 'center' : (isHBar ? 'start' : 'center'),
          color: (context) => {
            if (isDoughnut) return '#ffffff';
            if (!isHBar) return '#ffffff';
            // barra horizontal: dentro se valor grande, fora se pequeno
            const data = context.dataset.data;
            const max = Math.max(...data);
            const val = data[context.dataIndex];
            return (val / max) > 0.25 ? '#ffffff' : '#e8eaf6';
          },
          textStrokeColor: (context) => {
            if (!isHBar) return 'rgba(0,0,0,0.5)';
            const data = context.dataset.data;
            const max = Math.max(...data);
            return (data[context.dataIndex] / max) > 0.25 ? 'rgba(0,0,0,0.5)' : 'transparent';
          },
          textStrokeWidth: 3,
          padding: isHBar ? { right: 4 } : 0,
          display: (context) => context.dataset.data[context.dataIndex] > 0,
        },
        ...opts.plugins
      },
      scales: isBar ? {
        x: { ticks: { color: '#7b82a8', font:{size:10} }, grid: { color: 'rgba(46,49,80,.4)' } },
        y: { ticks: { color: '#7b82a8', font:{size:10} }, grid: { color: 'rgba(46,49,80,.4)' } }
      } : {},
      ...opts
    }
  });
}

// ── VISAO GERAL ────────────────────────────────────────────────────────────
function renderGeral() {
  const d    = getData();
  const v    = getView();
  const team = currentTeam.toUpperCase();
  const accentColor = currentTeam === 'creat' ? '#5b8af5' : '#f44b6e';

  document.getElementById('kpis-geral').innerHTML =
    kpiHtml('Time', team, mesLabel(currentMes)) +
    kpiHtml('Total', v.total, 'demandas') +
    kpiHtml('Em Andamento', (v.status_counts?.['Na fila']||0) + (v.status_counts?.['Em produção']||0) + (v.status_counts?.['Enviado']||0) + (v.status_counts?.['Revisão']||0) + (v.status_counts?.['Alteração']||0), '', 'info') +
    kpiHtml('Atrasadas', v.atrasados, `${v.taxa_atraso_geral}% do total`, v.atrasados > 0 ? 'danger' : 'ok') +
    kpiHtml('Em Aprovacao', v.em_aprovacao || (v.status_counts?.['Aprovação pendente']||0), '', 'warn') +
    kpiHtml('Finalizadas', v.finalizados, '', 'ok') +
    kpiHtml('Canceladas', v.cancelados, '', v.cancelados > 0 ? 'warn' : '') +
    kpiHtml('Fora de SLA', v.fora_sla, 'na criacao', v.fora_sla > 0 ? 'warn' : 'ok') +
    kpiHtml('Freelancer', v.freelancer || 0, 'label FREELANCER no JIRA', v.freelancer > 0 ? 'info' : '');

  const sc = v.status_counts || {};
  makeChart('chart-status', 'doughnut',
    Object.keys(sc), [{data: Object.values(sc), backgroundColor: Object.keys(sc).map((_,i) => COLORS[i%COLORS.length]), borderWidth:0}],
    { plugins: { legend: { position: 'right', labels: { color:'#7b82a8', font:{size:11}, boxWidth:10 } } } }
  );

  const tc = v.tipo_counts || {};
  makeChart('chart-tipo', 'bar', Object.keys(tc),
    [{ data: Object.values(tc), backgroundColor: accentColor, borderRadius: 4 }],
    { plugins: { legend: { display: false } }, indexAxis: 'y' }

  const ac = v.area_counts || {};
  makeChart('chart-area', 'bar', Object.keys(ac),
    [{ data: Object.values(ac), backgroundColor: '#a78bfa', borderRadius: 4 }],
    { plugins: { legend: { display: false } }, indexAxis: 'y' }
  );

  // Demandas por designer no período
  const designers = Object.entries(d.designers).map(([name, info]) => {
    let total = currentMes === 'todos' ? info.total : (info.por_mes?.[currentMes]?.total || 0);
    return { name, total };
  }).filter(x => x.total > 0).sort((a,b) => b.total - a.total);

  const designerLabel = currentTeam === 'red' ? 'Redator' : 'Designer';
  const titleEl = document.getElementById('chart-designer-title');
  if (titleEl) titleEl.textContent = `Demandas por ${designerLabel}`;

  makeChart('chart-designer', 'bar',
    designers.map(x => x.name.split(' ')[0]),
    [{ data: designers.map(x => x.total), backgroundColor: '#22d3ee', borderRadius: 4 }],
    { plugins: { legend: { display: false } } }
  );
}

// ── POR DESIGNER ───────────────────────────────────────────────────────────
function renderDesigners() {
  const tabsEl   = document.getElementById('designer-tabs');
  const panelsEl = document.getElementById('designer-panels');
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';

  const d = getData();
  const designers = Object.entries(d.designers).filter(([_, info]) => {
    const t = currentMes === 'todos' ? info.total : (info.por_mes?.[currentMes]?.total || 0);
    return t > 0;
  });

  if (!designers.length) {
    panelsEl.innerHTML = '<div class="empty-state">Sem dados para este periodo.</div>';
    return;
  }

  designers.forEach(([name, info], idx) => {
    const id  = 'dp-' + idx;
    const tab = document.createElement('div');
    tab.className = 'designer-tab' + (idx === 0 ? ' active' : '');
    tab.textContent = name;
    tab.onclick = () => {
      document.querySelectorAll('.designer-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.designer-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(id).classList.add('active');
    };
    tabsEl.appendChild(tab);

    // Valores filtrados pelo mês
    let total, atrasadas, finalizadas, canceladas, fora_sla, em_andamento, taxa_atraso, freelancer;
    if (currentMes === 'todos') {
      total        = info.total;
      atrasadas    = info.atrasadas;
      finalizadas  = info.finalizadas;
      canceladas   = info.canceladas;
      fora_sla     = info.fora_sla;
      em_andamento = info.em_andamento;
      taxa_atraso  = info.taxa_atraso;
      freelancer   = info.freelancer || 0;
    } else {
      const pm = info.por_mes?.[currentMes] || {};
      total        = pm.total || 0;
      atrasadas    = pm.atrasadas || 0;
      finalizadas  = 0;
      canceladas   = 0;
      fora_sla     = 0;
      em_andamento = 0;
      taxa_atraso  = total > 0 ? Math.round(atrasadas/total*100) : 0;
      freelancer   = pm.freelancer || 0;
    }

    const atrasoClass = taxa_atraso >= 50 ? 'danger' : taxa_atraso >= 20 ? 'warn' : 'ok';

    const tiposHtml = Object.entries(info.tipos).map(([t,v]) => {
      const dets = (info.tipos_detalhes || {})[t] || [];
      const items = dets.slice(0,15).map(d =>
        `<div class="tipo-tooltip-item">
          <span class="tipo-tooltip-key">${d.key}</span>
          <span class="tipo-tooltip-title">${d.titulo}</span>
        </div>`).join('');
      const more = dets.length > 15 ? `<div class="tipo-tooltip-more">+ ${dets.length - 15} demandas</div>` : '';
      const tooltip = dets.length ? `<div class="tipo-tooltip">${items}${more}</div>` : '';
      return `<tr><td><div class="tipo-tooltip-wrap">${t}${tooltip}</div></td><td><b>${v}</b></td></tr>`;
    }).join('') ||
      '<tr><td colspan="2" style="color:var(--text-muted)">Sem dados</td></tr>';

    const atrasadasHtml = info.demandas_atrasadas.map(dem =>
      `<tr>
        <td>${dem.titulo || '—'}</td>
        <td><span class="status-pill ${statusClass(dem.status)}">${dem.status}</span></td>
        <td>${dem.area || '—'}</td>
        <td class="atraso-tag">${dem.prazo}</td>
      </tr>`).join('') ||
      '<tr><td colspan="4" style="color:var(--text-muted)">Nenhuma atrasada</td></tr>';

    const panel = document.createElement('div');
    panel.id = id;
    panel.className = 'designer-panel' + (idx === 0 ? ' active' : '');
    panel.innerHTML = `
      <div class="designer-kpis">
        ${kpiHtml('Total', total)}
        ${kpiHtml('Em Andamento', em_andamento)}
        ${kpiHtml('Finalizadas', finalizadas, '', 'ok')}
        ${kpiHtml('Atrasadas', atrasadas, taxa_atraso + '%', atrasoClass)}
        ${kpiHtml('Canceladas', canceladas)}
        ${kpiHtml('Fora de SLA', fora_sla, 'na criacao', fora_sla > 0 ? 'warn' : 'ok')}
        ${kpiHtml('Freelancer', freelancer, 'demandas com label FREELANCER', freelancer > 0 ? 'info' : '')}
      </div>
      <div class="charts-grid">
        <div class="card">
          <h3>Tipos de Demanda</h3>
          <div class="table-wrap">
            <table><thead><tr><th>Tipo</th><th>Qtd</th></tr></thead><tbody>${tiposHtml}</tbody></table>
          </div>
        </div>
        <div class="card">
          <h3>Demandas Atrasadas</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Demanda</th><th>Status</th><th>Area</th><th>Prazo</th></tr></thead>
              <tbody>${atrasadasHtml}</tbody>
            </table>
          </div>
        </div>
      </div>`;
    panelsEl.appendChild(panel);
  });
}

// ── DRILL DOWN DE AREA ─────────────────────────────────────────────────────
function showAreaDrillDown(area) {
  const d = getData();
  const el = document.getElementById('area-drill-down');
  const demandas = (d.demandas_atrasadas_por_area || {})[area] || [];

  if (!demandas.length) { el.style.display = 'none'; return; }

  const rows = demandas.map(r => `<tr>
    <td style="font-size:12px">${r.titulo || '—'}</td>
    <td><span style="font-size:11px;color:var(--text-muted)">${r.key}</span></td>
    <td>${r.designer ? r.designer.split(' ')[0] : '—'}</td>
    <td><span class="status-pill ${statusClass(r.status)}">${r.status}</span></td>
    <td class="atraso-tag">${r.prazo}</td>
  </tr>`).join('');

  el.style.display = 'block';
  el.innerHTML = `<div class="card">
    <h3 style="display:flex;align-items:center;justify-content:space-between">
      <span>Atrasadas em <span style="color:var(--red)">${area}</span> — ${demandas.length} demanda${demandas.length !== 1 ? 's' : ''}</span>
      <span onclick="document.getElementById('area-drill-down').style.display='none'" style="cursor:pointer;font-size:18px;color:var(--text-muted);font-weight:300">×</span>
    </h3>
    <div class="table-wrap"><table>
      <thead><tr><th>Demanda</th><th>Key</th><th>Designer</th><th>Status</th><th>Prazo</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── POR AREA ───────────────────────────────────────────────────────────────
function renderAreas() {
  const v = getView();
  const ac = v.area_counts || {};
  const aa = v.area_atrasados || {};
  const accentColor = currentTeam === 'creat' ? '#5b8af5' : '#f44b6e';

  makeChart('chart-area2', 'bar', Object.keys(ac),
    [{ data: Object.values(ac), backgroundColor: accentColor, borderRadius: 4 }],
    { plugins: { legend: { display: false } }, indexAxis: 'y' }
  );
  const areaAtrasoLabels = Object.keys(aa);
  makeChart('chart-area-atraso', 'bar', areaAtrasoLabels,
    [{ data: Object.values(aa), backgroundColor: '#f44b6e', borderRadius: 4 }],
    { plugins: { legend: { display: false } }, indexAxis: 'y',
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const area = areaAtrasoLabels[elements[0].index];
        showAreaDrillDown(area);
      },
      onHover: (evt, elements) => {
        evt.native.target.style.cursor = elements.length ? 'pointer' : 'default';
      }
    }
  );

  const tbl  = document.getElementById('table-areas');
  const rows = Object.keys(ac).map(area => ({
    area, total: ac[area]||0, atrasos: aa[area]||0,
    pct: ac[area] > 0 ? Math.round((aa[area]||0)/ac[area]*100) : 0
  })).sort((a,b) => b.total - a.total);

  tbl.innerHTML = `<thead><tr><th>Area</th><th>Total</th><th>Atrasadas</th><th>% Atraso</th></tr></thead><tbody>` +
    rows.map(r => `<tr>
      <td>${r.area}</td><td>${r.total}</td>
      <td>${r.atrasos > 0 ? `<span class="atraso-tag">${r.atrasos}</span>` : '0'}</td>
      <td>${r.pct > 0 ? `<span class="badge badge-${r.pct>=50?'red':r.pct>=20?'yellow':'green'}">${r.pct}%</span>` : '—'}</td>
    </tr>`).join('') + '</tbody>';
}

function renderAtrasos() {

  document.getElementById('kpis-atrasos').innerHTML =
    kpiHtml('Total Atrasadas', v.atrasados, `${v.taxa_atraso_geral}% do total`, v.atrasados > 0 ? 'danger' : 'ok') +
    kpiHtml('Maior Concentracao', Object.keys(v.area_atrasados||{})[0] || '—', 'por area') +
    kpiHtml('Canceladas', v.cancelados, '');

  // Atrasos por designer (sempre usa dados globais do designer, pois demandas_atrasadas é global)
  const dd = Object.entries(d.designers)
    .map(([name, info]) => {
      const atr = currentMes === 'todos' ? info.atrasadas : (info.por_mes?.[currentMes]?.atrasadas || 0);
      return { name: name.split(' ')[0], atr };
    })
    .filter(x => x.atr > 0).sort((a,b) => b.atr - a.atr);

  const atrasosLabel = currentTeam === 'red' ? 'Redator' : 'Designer';
  const atrasosTitle = document.getElementById('chart-atrasos-designer-title');
  if (atrasosTitle) atrasosTitle.textContent = `Atrasadas por ${atrasosLabel}`;

  makeChart('chart-atrasos-designer', 'bar',
    dd.map(x => x.name),
    [{ data: dd.map(x => x.atr), backgroundColor: '#f44b6e', borderRadius: 4 }],
    { plugins: { legend: { display: false } } }
  );

  // Tabela de atrasos (usa lista global de demandas_atrasadas)
  const rows = [];
  Object.entries(d.designers).forEach(([name, info]) => {
    info.demandas_atrasadas.forEach(dem => rows.push({ designer: name, ...dem }));
  });
  rows.sort((a,b) => (a.prazo||'') < (b.prazo||'') ? -1 : 1);

  const tbl = document.getElementById('table-atrasos');
  tbl.innerHTML = `<thead><tr><th>Demanda</th><th>Designer</th><th>Status</th><th>Area</th><th>Prazo</th></tr></thead><tbody>` +
    (rows.length ? rows.map(r => `<tr>
      <td>${r.titulo||'—'}</td>
      <td>${r.designer.split(' ')[0]}</td>
      <td><span class="status-pill ${statusClass(r.status)}">${r.status}</span></td>
      <td>${r.area||'—'}</td>
      <td class="atraso-tag">${r.prazo}</td>
    </tr>`).join('') : '<tr><td colspan="5" class="empty-state">Nenhuma atrasada</td></tr>') +
    '</tbody>';
}

// ── METRICAS ────────────────────────────────────────────────────────────────
function renderMetricas() {
  const d = getData();
  const v = getView();
  const m = d.metricas || {};

  function valOrDash(v, suffix='') {
    return v !== null && v !== undefined ? `${v}${suffix}` : null;
  }

  function metCard(label, value, sub, cls) {
    const isEmpty = value === null || value === undefined;
    return `<div class="met-card ${isEmpty ? 'empty' : (cls||'')}">
      <div class="m-label">${label}</div>
      ${isEmpty
        ? `<div class="m-value" style="font-size:18px;color:var(--text-muted)">—</div>
           <div class="m-empty">Aguardando dados no Notion</div>`
        : `<div class="m-value">${value}</div>
           ${sub ? `<div class="m-sub">${sub}</div>` : ''}`
      }
    </div>`;
  }

  function barList(title, obj, color) {
    if (!obj || !Object.keys(obj).length) return '';
    const max = Math.max(...Object.values(obj));
    const rows = Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v]) => `
      <div class="met-bar-row">
        <div class="met-bar-label">${k}</div>
        <div class="met-bar-track"><div class="met-bar-fill" style="width:${Math.round(v/max*100)}%;background:${color||'var(--accent)'}"></div></div>
        <div class="met-bar-val">${v}d</div>
      </div>`).join('');
    return `<div class="card" style="margin-top:14px">
      <h3>${title}</h3>
      <div class="met-bar-list" style="margin-top:8px">${rows}</div>
    </div>`;
  }

  // — Produtividade —
  const total   = v.total || 0;
  const atr     = v.atrasados || 0;
  const fin     = v.finalizados || 0;
  const canc    = v.cancelados || 0;
  const txAtr   = v.taxa_atraso_geral;
  const txCanc  = total > 0 ? Math.round(canc/total*100) : 0;
  const fSla    = v.fora_sla || 0;

  // — Qualidade (do metricas global, pois vem de finalizados) —
  const slaM    = valOrDash(m.sla_medio_dias, ' dias');
  const slaSub  = m.sla_amostras > 0 ? `${m.sla_amostras} entregas com data real preenchida` : null;
  const pont    = valOrDash(m.taxa_pontualidade != null ? m.taxa_pontualidade + '%' : null);
  const pontSub = m.pont_amostras > 0 ? `${m.pont_amostras} entregas comparadas` : null;
  const ap1a    = valOrDash(m.taxa_aprov_1a != null ? m.taxa_aprov_1a + '%' : null);
  const ap1aSub = m.aprov_1a_amostras > 0 ? `${m.aprov_1a_amostras} finalizadas avaliadas` : null;
  const rev     = valOrDash(m.rev_medio != null ? m.rev_medio + 'x' : null);
  const revSub  = m.rev_amostras > 0 ? `${m.rev_amostras} demandas com nº revisoes` : null;
  const rat     = valOrDash(m.rating_medio != null ? '⭐ ' + m.rating_medio : null);
  const ratSub  = m.rating_amostras > 0 ? `${m.rating_amostras} avaliações recebidas` : null;

  // Rating distribution bar
  let ratingBarHtml = '';
  if (m.rating_dist && Object.keys(m.rating_dist).length > 0) {
    const total_r = Object.values(m.rating_dist).reduce((a,b)=>a+b,0);
    ratingBarHtml = `<div class="card" style="margin-top:14px"><h3>Distribuicao de Ratings</h3>
      <div class="met-bar-list" style="margin-top:8px">` +
      [5,4,3,2,1].map(n => {
        const cnt = m.rating_dist[n] || 0;
        const pct = total_r > 0 ? Math.round(cnt/total_r*100) : 0;
        return `<div class="met-bar-row">
          <div class="met-bar-label">${'⭐'.repeat(n)}</div>
          <div class="met-bar-track"><div class="met-bar-fill" style="width:${pct}%;background:${n>=4?'var(--green)':n===3?'var(--yellow)':'var(--red)'}"></div></div>
          <div class="met-bar-val">${cnt}</div>
        </div>`;
      }).join('') +
      `</div></div>`;
  }

  document.getElementById('metricas-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px">
      <div style="font-size:13px;color:var(--text-muted)">Métricas de performance — ${currentTeam.toUpperCase()} · ${mesLabel(currentMes)}</div>
      <a class="notion-link" href="https://www.notion.so/g40/Medidores-do-Time-Creative-Produtividade-Qualidade-e-Inova-o-33eb431349e1814aa0b2d18d5cc70f29" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 0 1 1h4"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Ver no Notion
      </a>
    </div>

    <div class="met-section">
      <div class="met-section-title">🏎 Produtividade</div>
      <div class="met-grid">
        ${metCard('Total de Demandas', total, mesLabel(currentMes))}
        ${metCard('Finalizadas', fin, 'Finalizado + Aprovado', 'ok')}
        ${metCard('Atrasadas', atr, `${txAtr}% do total`, atr > 0 ? 'danger' : 'ok')}
        ${metCard('Canceladas', canc, `${txCanc}% do total`, canc > 0 ? 'warn' : '')}
        ${metCard('Fora de SLA na criacao', fSla, 'prazo < SLA minimo ao criar', fSla > 0 ? 'warn' : 'ok')}
        ${metCard('Demandas Freelancer', v.freelancer || 0, 'label FREELANCER no JIRA', v.freelancer > 0 ? 'info' : '')}
      </div>
    </div>

    <div class="met-section">
      <div class="met-section-title">⏱ SLA & Velocidade</div>
      <div class="met-grid">
        ${metCard('SLA Medio Executado', slaM, slaSub, slaM ? (parseFloat(slaM)<=5?'ok':'warn') : '')}
        ${metCard('Pontualidade', pont, pontSub, pont ? (parseFloat(pont)>=80?'ok':parseFloat(pont)>=60?'warn':'danger') : '')}
      </div>
      ${barList('Lead Time Medio por Tipo (dias)', m.sla_por_tipo, 'var(--blue)')}
    </div>

    <div class="met-section">
      <div class="met-section-title">✅ Qualidade</div>
      <div class="met-grid">
        ${metCard('Aprovado de Primeira', ap1a, ap1aSub, ap1a ? (parseFloat(ap1a)>=70?'ok':parseFloat(ap1a)>=50?'warn':'danger') : '')}
        ${metCard('Revisoes Medias', rev, revSub, rev ? (parseFloat(rev)<=1?'ok':parseFloat(rev)<=2?'warn':'danger') : '')}
        ${metCard('Rating Medio', rat, ratSub, rat ? (m.rating_medio>=4?'ok':m.rating_medio>=3?'warn':'danger') : '')}
      </div>
      ${ratingBarHtml}
    </div>
  `;
}
