<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Creative — G4</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3150;
    --text: #e8eaf6;
    --text-muted: #7b82a8;
    --green: #4caf7d;
    --red: #f44b6e;
    --yellow: #f5a623;
    --blue: #5b8af5;
    --purple: #a78bfa;
    --cyan: #22d3ee;
    --accent: #5b8af5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    gap: 16px;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .3px; white-space: nowrap; }
  header .meta { color: var(--text-muted); font-size: 12px; }

  /* Toggle CREAT / RED */
  .team-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .team-toggle button {
    background: none; border: none;
    padding: 5px 16px; border-radius: 6px;
    font-size: 12px; font-weight: 700; letter-spacing: .5px;
    cursor: pointer; color: var(--text-muted); transition: .15s;
  }
  .team-toggle button.active-creat {
    background: #1e3a5f; color: #5b8af5;
  }
  .team-toggle button.active-red {
    background: #3d1a1a; color: #f44b6e;
  }
  .team-toggle button:not(.active-creat):not(.active-red):hover {
    background: var(--surface2); color: var(--text);
  }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(76,175,125,.15); color: var(--green); }
  .badge-red   { background: rgba(244,75,110,.15);  color: var(--red); }
  .badge-yellow{ background: rgba(245,166,35,.15);  color: var(--yellow); }
  .badge-blue  { background: rgba(91,138,245,.15);  color: var(--blue); }

  nav {
    display: flex;
    gap: 4px;
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  nav button {
    background: none; border: none; color: var(--text-muted);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: .15s;
  }
  nav button:hover { background: var(--surface2); color: var(--text); }
  nav button.active { background: var(--surface2); color: var(--accent); }

  .page { display: none; padding: 24px 28px; }
  .page.active { display: block; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 16px;
  }
  .kpi .label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
  .kpi .value { font-size: 28px; font-weight: 700; line-height: 1; }
  .kpi .sub { color: var(--text-muted); font-size: 11px; margin-top: 4px; }
  .kpi.danger { border-color: rgba(244,75,110,.3); }
  .kpi.warn   { border-color: rgba(245,166,35,.3); }
  .kpi.ok     { border-color: rgba(76,175,125,.3); }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .charts-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  @media(max-width:900px){ .charts-grid,.charts-grid.three { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px;
  }
  .card h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .5px; }
  .chart-wrap { position: relative; height: 220px; }

  /* Designer tabs */
  .designer-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .designer-tab {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: .15s;
  }
  .designer-tab:hover { border-color: var(--accent); }
  .designer-tab.active { border-color: var(--accent); background: rgba(91,138,245,.1); color: var(--accent); }

  .designer-panel { display: none; }
  .designer-panel.active { display: block; }
  .designer-kpis { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }

  /* Tabela */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  td { padding: 9px 12px; border-bottom: 1px solid rgba(46,49,80,.5); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .status-pill {
    display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .s-na-fila     { background: rgba(91,138,245,.15); color: var(--blue); }
  .s-enviado     { background: rgba(34,211,238,.15); color: var(--cyan); }
  .s-producao    { background: rgba(167,139,250,.15); color: var(--purple); }
  .s-aprovado    { background: rgba(76,175,125,.15); color: var(--green); }
  .s-finalizado  { background: rgba(76,175,125,.15); color: var(--green); }
  .s-cancelada   { background: rgba(244,75,110,.15); color: var(--red); }
  .s-revisao     { background: rgba(245,166,35,.15); color: var(--yellow); }
  .s-alteracao   { background: rgba(245,166,35,.15); color: var(--yellow); }
  .s-aprovpend   { background: rgba(245,166,35,.15); color: var(--yellow); }
  .s-default     { background: rgba(123,130,168,.15); color: var(--text-muted); }

  .atraso-tag { color: var(--red); font-size: 11px; font-weight: 600; }

  .team-label-creat { color: #5b8af5; font-weight: 700; font-size: 11px; }
  .team-label-red   { color: #f44b6e; font-weight: 700; font-size: 11px; }

  footer { text-align: center; padding: 20px; color: var(--text-muted); font-size: 11px; border-top: 1px solid var(--border); margin-top: 12px; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:14px">
    <h1>Dashboard Creative — G4</h1>
    <div class="team-toggle">
      <button id="btn-creat" class="active-creat" onclick="switchTeam('creat')">CREAT</button>
      <button id="btn-red" onclick="switchTeam('red')">RED</button>
    </div>
  </div>
  <div class="meta" id="header-meta">Carregando...</div>
</header>

<nav>
  <button class="active" onclick="showPage('geral', this)">Visao Geral</button>
  <button onclick="showPage('designers', this)">Por Designer</button>
  <button onclick="showPage('areas', this)">Por Area</button>
  <button onclick="showPage('atrasos', this)">Atrasos</button>
</nav>

<!-- VISAO GERAL -->
<div id="page-geral" class="page active">
  <div class="kpi-grid" id="kpis-geral"></div>
  <div class="charts-grid">
    <div class="card"><h3>Status das Demandas</h3><div class="chart-wrap"><canvas id="chart-status"></canvas></div></div>
    <div class="card"><h3>Tipo de Demanda</h3><div class="chart-wrap"><canvas id="chart-tipo"></canvas></div></div>
  </div>
  <div class="charts-grid">
    <div class="card"><h3>Volume por Area Solicitante</h3><div class="chart-wrap"><canvas id="chart-area"></canvas></div></div>
    <div class="card"><h3>Demandas por Designer</h3><div class="chart-wrap"><canvas id="chart-designer"></canvas></div></div>
  </div>
</div>

<!-- POR DESIGNER -->
<div id="page-designers" class="page">
  <div class="designer-tabs" id="designer-tabs"></div>
  <div id="designer-panels"></div>
</div>

<!-- POR AREA -->
<div id="page-areas" class="page">
  <div class="charts-grid">
    <div class="card"><h3>Volume Total por Area</h3><div class="chart-wrap"><canvas id="chart-area2"></canvas></div></div>
    <div class="card"><h3>Atrasos por Area</h3><div class="chart-wrap"><canvas id="chart-area-atraso"></canvas></div></div>
  </div>
  <div class="card" style="margin-top:16px">
    <h3>Detalhamento por Area</h3>
    <div class="table-wrap"><table id="table-areas"></table></div>
  </div>
</div>

<!-- ATRASOS -->
<div id="page-atrasos" class="page">
  <div class="kpi-grid" id="kpis-atrasos"></div>
  <div class="card">
    <h3>Demandas Atrasadas por Designer</h3>
    <div class="chart-wrap"><canvas id="chart-atrasos-designer"></canvas></div>
  </div>
  <div class="card" style="margin-top:16px">
    <h3>Tabela de Atrasos</h3>
    <div class="table-wrap"><table id="table-atrasos"></table></div>
  </div>
</div>

<footer id="footer-updated"></footer>

<script>
// ── DADOS ──────────────────────────────────────────────────────────────────
const DATA_CREAT = {"gerado_em": "2026-04-10", "corte": "2026-04-01", "total": 0, "atrasados": 0, "cancelados": 0, "fora_sla": 0, "finalizados": 0, "taxa_atraso_geral": 0, "status_counts": {}, "tipo_counts": {}, "area_counts": {}, "area_atrasados": {}, "designers": {}};
const DATA_RED   = {"gerado_em": "2026-04-10", "corte": "2026-04-01", "total": 0, "atrasados": 0, "cancelados": 0, "fora_sla": 0, "finalizados": 0, "taxa_atraso_geral": 0, "status_counts": {}, "tipo_counts": {}, "area_counts": {}, "area_atrasados": {}, "designers": {}};

// ── STATE ──────────────────────────────────────────────────────────────────
let currentTeam = 'creat';
let chartInstances = {};

// ── HELPERS ────────────────────────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
}

function switchTeam(team) {
  currentTeam = team;
  document.getElementById('btn-creat').className = team === 'creat' ? 'active-creat' : '';
  document.getElementById('btn-red').className   = team === 'red'   ? 'active-red'   : '';
  // Accent color
  document.documentElement.style.setProperty('--accent', team === 'creat' ? '#5b8af5' : '#f44b6e');
  renderAll();
}

function getData() {
  return currentTeam === 'creat' ? DATA_CREAT : DATA_RED;
}

function statusClass(s) {
  const m = {
    'Na fila': 's-na-fila', 'Enviado': 's-enviado', 'Em producao': 's-producao', 'Em produção': 's-producao',
    'Aprovado': 's-aprovado', 'Finalizado': 's-finalizado', 'Cancelada': 's-cancelada',
    'Revisao': 's-revisao', 'Revisão': 's-revisao',
    'Alteracao': 's-alteracao', 'Alteração': 's-alteracao',
    'Aprovacao pendente': 's-aprovpend', 'Aprovação pendente': 's-aprovpend',
  };
  return m[s] || 's-default';
}

function kpiHtml(label, value, sub, cls) {
  return `<div class="kpi ${cls||''}">
    <div class="label">${label}</div>
    <div class="value">${value}</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}

const COLORS = ['#5b8af5','#a78bfa','#22d3ee','#4caf7d','#f5a623','#f44b6e','#fb923c','#34d399','#818cf8','#f472b6'];

function makeChart(id, type, labels, datasets, opts={}) {
  if (chartInstances[id]) {
    chartInstances[id].destroy();
    delete chartInstances[id];
  }
  const ctx = document.getElementById(id);
  if (!ctx) return;
  chartInstances[id] = new Chart(ctx, {
    type,
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#7b82a8', font: { size: 11 } } },
        ...opts.plugins
      },
      scales: type === 'bar' ? {
        x: { ticks: { color: '#7b82a8', font:{size:10} }, grid: { color: 'rgba(46,49,80,.4)' } },
        y: { ticks: { color: '#7b82a8', font:{size:10} }, grid: { color: 'rgba(46,49,80,.4)' } }
      } : {},
      ...opts
    }
  });
}

// ── VISAO GERAL ────────────────────────────────────────────────────────────
function renderGeral() {
  const d = getData();
  const pct_atraso = d.taxa_atraso_geral;
  const kpis = document.getElementById('kpis-geral');
  const teamLabel = currentTeam === 'creat'
    ? '<span class="team-label-creat">CREAT</span>'
    : '<span class="team-label-red">RED</span>';

  kpis.innerHTML =
    kpiHtml('Time', currentTeam.toUpperCase(), `desde ${d.corte || '01/04/2026'}`) +
    kpiHtml('Total de Demandas', d.total, `desde ${(d.corte||'').slice(5).replace('-','/')}/${(d.corte||'').slice(0,4)}`) +
    kpiHtml('Atrasadas', d.atrasados, `${pct_atraso}% do total`, d.atrasados > 0 ? 'danger' : 'ok') +
    kpiHtml('Canceladas', d.cancelados, '', d.cancelados > 0 ? 'warn' : '') +
    kpiHtml('Finalizadas', d.finalizados, '', 'ok') +
    kpiHtml('Fora de SLA', d.fora_sla, 'na criacao', d.fora_sla > 0 ? 'warn' : 'ok');

  const sc = d.status_counts;
  const statusColors = Object.keys(sc).map((_, i) => COLORS[i % COLORS.length]);
  makeChart('chart-status', 'doughnut',
    Object.keys(sc), [{data: Object.values(sc), backgroundColor: statusColors, borderWidth:0}],
    { plugins: { legend: { position: 'right', labels: { color:'#7b82a8', font:{size:11}, boxWidth:10 } } } }
  );

  const tc = d.tipo_counts;
  makeChart('chart-tipo', 'bar',
    Object.keys(tc),
    [{ data: Object.values(tc), backgroundColor: currentTeam === 'creat' ? '#5b8af5' : '#f44b6e', borderRadius: 4 }],
    { plugins: { legend: { display: false } }, indexAxis: 'y' }
  );

  const ac = d.area_counts;
  makeChart('chart-area', 'bar',
    Object.keys(ac),
    [{ data: Object.values(ac), backgroundColor: '#a78bfa', borderRadius: 4 }],
    { plugins: { legend: { display: false } }, indexAxis: 'y' }
  );

  const designers = Object.entries(d.designers).map(([name, info]) => ({ name, total: info.total }))
    .sort((a,b) => b.total - a.total);
  makeChart('chart-designer', 'bar',
    designers.map(x => x.name.split(' ')[0]),
    [{ data: designers.map(x => x.total), backgroundColor: '#22d3ee', borderRadius: 4 }],
    { plugins: { legend: { display: false } } }
  );
}

// ── POR DESIGNER ───────────────────────────────────────────────────────────
function renderDesigners() {
  const tabsEl   = document.getElementById('designer-tabs');
  const panelsEl = document.getElementById('designer-panels');
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';

  const designers = Object.entries(getData().designers);
  if (designers.length === 0) {
    panelsEl.innerHTML = '<p style="color:var(--text-muted);padding:20px">Sem dados para este time no periodo selecionado.</p>';
    return;
  }

  designers.forEach(([name, info], idx) => {
    const id = 'designer-' + idx;
    const tab = document.createElement('div');
    tab.className = 'designer-tab' + (idx === 0 ? ' active' : '');
    tab.textContent = name;
    tab.onclick = () => {
      document.querySelectorAll('.designer-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.designer-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(id).classList.add('active');
    };
    tabsEl.appendChild(tab);

    const panel = document.createElement('div');
    panel.id = id;
    panel.className = 'designer-panel' + (idx === 0 ? ' active' : '');

    const atrasoPct  = info.taxa_atraso;
    const atrasoClass = atrasoPct >= 50 ? 'danger' : atrasoPct >= 20 ? 'warn' : 'ok';

    const tiposHtml = Object.entries(info.tipos).map(([t,v]) =>
      `<tr><td>${t}</td><td><b>${v}</b></td></tr>`).join('') || '<tr><td colspan="2" style="color:var(--text-muted)">Sem dados</td></tr>';

    const atrasadasHtml = info.demandas_atrasadas.map(dem =>
      `<tr>
        <td>${dem.titulo || '—'}</td>
        <td><span class="status-pill ${statusClass(dem.status)}">${dem.status}</span></td>
        <td>${dem.area || '—'}</td>
        <td class="atraso-tag">${dem.prazo}</td>
      </tr>`).join('') || '<tr><td colspan="4" style="color:var(--text-muted)">Nenhuma demanda atrasada</td></tr>';

    panel.innerHTML = `
      <div class="designer-kpis">
        ${kpiHtml('Total', info.total)}
        ${kpiHtml('Em andamento', info.em_andamento)}
        ${kpiHtml('Finalizadas', info.finalizadas, '', 'ok')}
        ${kpiHtml('Atrasadas', info.atrasadas, `${atrasoPct}%`, atrasoClass)}
        ${kpiHtml('Canceladas', info.canceladas)}
        ${kpiHtml('Fora de SLA', info.fora_sla, 'na criacao', info.fora_sla > 0 ? 'warn' : 'ok')}
      </div>
      <div class="charts-grid">
        <div class="card">
          <h3>Tipos de Demanda</h3>
          <div class="table-wrap">
            <table><thead><tr><th>Tipo</th><th>Qtd</th></tr></thead><tbody>${tiposHtml}</tbody></table>
          </div>
        </div>
        <div class="card">
          <h3>Demandas Atrasadas</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Demanda</th><th>Status</th><th>Area</th><th>Prazo</th></tr></thead>
              <tbody>${atrasadasHtml}</tbody>
            </table>
          </div>
        </div>
      </div>`;
    panelsEl.appendChild(panel);
  });
}

// ── POR AREA ───────────────────────────────────────────────────────────────
function renderAreas() {
  const d  = getData();
  const ac = d.area_counts;
  const aa = d.area_atrasados;

  makeChart('chart-area2', 'bar',
    Object.keys(ac),
    [{ data: Object.values(ac), backgroundColor: currentTeam === 'creat' ? '#5b8af5' : '#f44b6e', borderRadius: 4 }],
    { plugins: { legend: { display: false } }, indexAxis: 'y' }
  );
  makeChart('chart-area-atraso', 'bar',
    Object.keys(aa),
    [{ data: Object.values(aa), backgroundColor: '#f44b6e', borderRadius: 4 }],
    { plugins: { legend: { display: false } }, indexAxis: 'y' }
  );

  const tbl  = document.getElementById('table-areas');
  const rows = Object.keys(ac).map(area => {
    const total  = ac[area] || 0;
    const atrasos = aa[area] || 0;
    const pct    = total > 0 ? Math.round(atrasos/total*100) : 0;
    return { area, total, atrasos, pct };
  }).sort((a,b) => b.total - a.total);

  tbl.innerHTML = `<thead><tr><th>Area</th><th>Total</th><th>Atrasadas</th><th>% Atraso</th></tr></thead><tbody>` +
    rows.map(r => `<tr>
      <td>${r.area}</td>
      <td>${r.total}</td>
      <td>${r.atrasos > 0 ? `<span class="atraso-tag">${r.atrasos}</span>` : '0'}</td>
      <td>${r.pct > 0 ? `<span class="badge badge-${r.pct>=50?'red':r.pct>=20?'yellow':'green'}">${r.pct}%</span>` : '—'}</td>
    </tr>`).join('') + '</tbody>';
}

// ── ATRASOS ────────────────────────────────────────────────────────────────
function renderAtrasos() {
  const d    = getData();
  const kpis = document.getElementById('kpis-atrasos');
  kpis.innerHTML =
    kpiHtml('Total Atrasadas', d.atrasados, `${d.taxa_atraso_geral}% do total`, d.atrasados > 0 ? 'danger' : 'ok') +
    kpiHtml('Maior Concentracao', Object.keys(d.area_atrasados)[0] || '—', 'por area') +
    kpiHtml('Canceladas', d.cancelados, '');

  const dd = Object.entries(d.designers)
    .map(([name, info]) => ({ name: name.split(' ')[0], atr: info.atrasadas }))
    .filter(x => x.atr > 0).sort((a,b) => b.atr - a.atr);

  makeChart('chart-atrasos-designer', 'bar',
    dd.map(x => x.name),
    [{ data: dd.map(x => x.atr), backgroundColor: '#f44b6e', borderRadius: 4 }],
    { plugins: { legend: { display: false } } }
  );

  const rows = [];
  Object.entries(d.designers).forEach(([name, info]) => {
    info.demandas_atrasadas.forEach(dem => rows.push({ designer: name, ...dem }));
  });
  rows.sort((a,b) => (a.prazo||'') < (b.prazo||'') ? -1 : 1);

  const tbl = document.getElementById('table-atrasos');
  tbl.innerHTML = `<thead><tr><th>Demanda</th><th>Designer</th><th>Status</th><th>Area</th><th>Prazo</th></tr></thead><tbody>` +
    rows.map(r => `<tr>
      <td>${r.titulo || '—'}</td>
      <td>${r.designer.split(' ')[0]}</td>
      <td><span class="status-pill ${statusClass(r.status)}">${r.status}</span></td>
      <td>${r.area || '—'}</td>
      <td class="atraso-tag">${r.prazo}</td>
    </tr>`).join('') + '</tbody>';
}

// ── RENDER ALL ─────────────────────────────────────────────────────────────
function renderAll() {
  const d    = getData();
  const team = currentTeam.toUpperCase();
  document.getElementById('header-meta').textContent =
    `${team} · Atualizado em ${d.gerado_em} · ${d.total} demandas (desde ${(d.corte||'2026-04-01').split('-').reverse().join('/')})`;
  document.getElementById('footer-updated').textContent =
    `Creative Dashboard · G4 · Dados: Notion banco 2026 · ${team} · Gerado em ${d.gerado_em}`;

  renderGeral();
